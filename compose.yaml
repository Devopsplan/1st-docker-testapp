version: "3.8"

services:
  mongo:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: vishal

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: vishal
      ME_CONFIG_MONGODB_URL: mongodb://admin:vishal@mongo:27017



# To run  or start the compose-file/containers = docker compose -f fileName.yaml up -d
# To run  or stop the compose-file/containers = docker compose -f fileName.yaml down

# Backend API = node server.js      http://localhost:5050/getUsers

# localhoast:5050 UI
# Mongo Express UI =  http://localhost:8081 backend UI



